<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blueprint-style hand rehabilitation assistant with camera-guided exercise navigation and live landmark coaching.">
    <title>Blueprint Rehab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div class="brand-lockup">
            <div class="brand-name">Blueprint Rehab</div>
            <div class="brand-subtitle">Camera-guided recovery training</div>
        </div>
        <nav class="topbar-nav" aria-label="Primary">
            <span>Overview</span>
            <span class="is-active">Training</span>
            <span>History</span>
        </nav>
        <div class="topbar-status">
            <span class="status-pill">
                <span id="cameraStatusDot" class="status-dot"></span>
                <span id="cameraStatusText">Camera offline</span>
            </span>
        </div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-heading">
                <div class="eyebrow">Rehab Portal</div>
                <h1>Active Session</h1>
            </div>
            <nav class="sidebar-nav" aria-label="Session">
                <button class="nav-item" data-nav="instructions" type="button">
                    <span class="nav-icon">i</span>
                    <span>Instructions</span>
                </button>
                <button class="nav-item" data-nav="training" type="button">
                    <span class="nav-icon">+</span>
                    <span>Training</span>
                </button>
                <button class="nav-item" data-nav="zones" type="button">
                    <span class="nav-icon">#</span>
                    <span>Zones</span>
                </button>
                <button class="nav-item" data-nav="pause" type="button">
                    <span class="nav-icon">||</span>
                    <span>Pause</span>
                </button>
                <button class="nav-item" data-nav="summary" type="button">
                    <span class="nav-icon">=</span>
                    <span>Summary</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="profile-chip">
                    <div class="profile-avatar">HR</div>
                    <div>
                        <div class="profile-name">Hand Recovery</div>
                        <div class="profile-id" id="exerciseMetaTag">Waiting for exercise data</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-shell">
            <div id="screenRoot" class="screen-root"></div>
        </main>
    </div>
</div>

<div id="cameraStage" class="media-stage is-hidden" aria-hidden="true">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div id="cameraScrim" class="camera-scrim"></div>
</div>

<div id="referencePanel" class="reference-panel is-hidden" aria-hidden="true">
    <div class="reference-frame">
        <video id="referenceVideo" loop muted playsinline></video>
    </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js" crossorigin="anonymous"></script>
<script src="/static/app.js"></script>
</body>
</html>
